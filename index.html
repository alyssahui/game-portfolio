<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="creator-name">Alyssa Dang</div>
        <!-- Background elements (mocked as classes since we don't know exactly which images are grass/mouse perfectly) -->
        <div class="background-layer" id="bg-grass"></div>
        
        <div class="character-container">
            <div id="marty-mouse" class="bobbing">
                <img src="pictures/mouse.png" alt="Marty" style="max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 10px;">
            </div>
            
            <div id="speech-bubble" class="hidden">
                 <img id="portfolio-image" src="" alt="Portfolio piece">
            </div>
        </div>
        
        <div class="vn-textbox">
            <div class="name-badge">Marty</div>
            <div class="dialogue-text" id="dialogue-text">Honey Haven ~ Game Design Portfolio ft. Main Theme<br> <br>[Click to continue!]</div>
        </div>
        
        <div id="end-overlay" class="hidden">
            <button id="restart-btn">See Again</button>
        </div>
    </div>
    
    <audio id="title-music" src="Honey Haven Title Screen.wav" loop></audio>
    <script src="script.js"></script>
</body>
</html>
